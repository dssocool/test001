{% extends "base.html" %}
{% block title %}Create domain{% endblock %}
{% block content %}
<h1>Create domain</h1>
<form method="post" action="{{ url_for('domains_bp.new') }}">
  <label for="name">Domain name</label>
  <input type="text" id="name" name="name" required placeholder="e.g. Sales">
  <label for="description">Description (optional)</label>
  <textarea id="description" name="description" rows="3" placeholder="Brief description of this domain"></textarea>
  <label for="data_generation_key">Data generation key (optional)</label>
  <input type="text" id="data_generation_key" name="data_generation_key" placeholder="Any Unicode — affects dry-run masking rounds">
  <p class="step-hint" style="margin-top:0.25rem;">Used when running a dry run: hashed to decide how many masking job rounds run (1–4).</p>
  <div class="form-actions">
    <button type="submit" class="btn">Save</button>
    <a href="{{ url_for('main_bp.index') }}" class="btn btn-secondary">Cancel</a>
  </div>
</form>
{% endblock %}
